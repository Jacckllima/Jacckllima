<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200" style="background: #090a0f; font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; border-radius: 8px;">
  <defs>
    <!-- Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00aa" />
      <stop offset="50%" stop-color="#8833ff" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a0a0c0" />
    </linearGradient>

    <!-- SVG Blur Filters -->
    <filter id="blur40" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <filter id="blur30" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#090a0f" />

  <!-- Subtle background glow -->
  <circle cx="400" cy="100" r="150" fill="#8833ff" opacity="0.08" filter="url(#blur40)" />
  <circle cx="100" cy="50" r="80" fill="#ff00aa" opacity="0.05" filter="url(#blur30)" />

  <!-- Premium border line at the bottom -->
  <rect x="0" y="195" width="800" height="5" fill="url(#primaryGrad)" />

  <!-- Main text elements -->
  <g transform="translate(50, 110)">
    <!-- Main Title -->
    <text x="0" y="0" font-size="44" font-weight="800" fill="url(#textGrad)" letter-spacing="1.5px">JAQUELINE LIMA</text>
    
    <!-- Subtitle -->
    <text x="3" y="35" font-size="15" font-weight="400" fill="#ff00aa" letter-spacing="4px">ENGENHARIA DE SOFTWARE &bull; DEV FULL STACK</text>
  </g>

  <!-- Tech tags displayed as a subtle border element -->
  <g transform="translate(750, 100)" text-anchor="end" opacity="0.15">
    <text x="0" y="-30" font-family="monospace" font-size="12" fill="#ffffff">&lt;code&gt;</text>
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#ffffff">&lt;design&gt;</text>
    <text x="0" y="30" font-family="monospace" font-size="12" fill="#ffffff">&lt;create&gt;</text>
  </g>
</svg>
